<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MeTaLog</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MeTaLog">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{
font-family:sans-serif;
margin:20px;
background:#111;
color:white;
}

button{
padding:10px;
margin:4px;
font-size:15px;
}

.folder{
border:1px solid #666;
padding:12px;
margin:6px 0;
cursor:pointer;
}

.card{
border:1px solid #444;
padding:12px;
margin:6px 0;
}

input,textarea{
width:100%;
margin:6px 0;
padding:10px;
font-size:16px;
background:#222;
color:white;
border:1px solid #555;
box-sizing:border-box;
}

.tag{
color:#6cf;
cursor:pointer;
margin-right:8px;
text-decoration:underline;
}

#path{
margin:10px 0;
}

#editorView{
margin-top:16px;
padding:12px;
border:1px solid #555;
background:#181818;
}

#status{
margin:8px 0 14px 0;
font-size:13px;
color:#aaa;
}
</style>
</head>

<body>

<h1>MeTaLog</h1>
<div id="status">起動中...</div>

<input id="searchBox" placeholder="検索..." oninput="searchLogs()">

<h3>タグ</h3>
<div id="tagList"></div>

<div id="path"></div>

<div id="list"></div>

<button onclick="addFolder()">📁 フォルダ追加</button>
<button onclick="openEditor()">📝 ログ追加</button>
<button onclick="exportData()">📤 エクスポート</button>
<button onclick="importData()">📥 インポート</button>
<input type="file" id="importFile" style="display:none">

<div id="editorView" style="display:none">
<button onclick="closeEditor()">← 戻る</button>

<h2>ログ入力</h2>

<input id="logTitle" placeholder="タイトル">
<textarea id="logText" rows="12" placeholder="本文 (Markdown可)"></textarea>

<button onclick="saveLog()">保存</button>
</div>

<script>
/* =========================
   IndexedDB
========================= */

const DB_NAME = "MeTaLogDB";
const DB_VERSION = 1;
const STORE_NAME = "appState";
const ROOT_KEY = "rootData";

let db = null;

function openDB(){
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onupgradeneeded = function(event){
      const database = event.target.result;
      if(!database.objectStoreNames.contains(STORE_NAME)){
        database.createObjectStore(STORE_NAME);
      }
    };

    request.onsuccess = function(){
      resolve(request.result);
    };

    request.onerror = function(){
      reject(request.error);
    };
  });
}

function idbGet(key){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const store = tx.objectStore(STORE_NAME);
    const req = store.get(key);

    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function idbSet(key, value){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    const req = store.put(value, key);

    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

/* =========================
   App State
========================= */

function makeEmptyRoot(){
  return { name:"root", folders:[], logs:[] };
}

let data = makeEmptyRoot();
let stack = [data];
let editingIndex = null;

/* =========================
   Search Index
========================= */

let searchDocs = [];
let gramIndex = new Map();

function normalizeText(text){
  return (text || "")
    .toLowerCase()
    .normalize("NFKC");
}

function makeGrams(text){
  const s = normalizeText(text);
  const grams = new Set();

  if(!s) return grams;

  if(s.length === 1){
    grams.add(s);
    return grams;
  }

  for(let i=0; i<s.length - 1; i++){
    grams.add(s.slice(i, i + 2));
  }

  return grams;
}

function flattenLogs(node, pathNames = []){
  let result = [];

  node.logs.forEach((log, index) => {
    result.push({
      title: log.title || "",
      text: log.text || "",
      date: log.date || "",
      path: [...pathNames, node.name],
      nodeRef: log,
      folderRef: node,
      indexInFolder: index
    });
  });

  node.folders.forEach(folder => {
    result.push(...flattenLogs(folder, [...pathNames, node.name]));
  });

  return result;
}

function rebuildSearchIndex(){
  searchDocs = flattenLogs(data, []);
  gramIndex = new Map();

  searchDocs.forEach((doc, docId) => {
    const source = `${doc.title}\n${doc.text}`;
    const grams = makeGrams(source);

    grams.forEach(g => {
      if(!gramIndex.has(g)){
        gramIndex.set(g, new Set());
      }
      gramIndex.get(g).add(docId);
    });
  });
}

function searchIndexed(query){
  const q = normalizeText(query).trim();
  if(!q) return [];

  const grams = [...makeGrams(q)];
  if(grams.length === 0) return [];

  let candidateSet = null;

  for(const g of grams){
    const ids = gramIndex.get(g) || new Set();

    if(candidateSet === null){
      candidateSet = new Set(ids);
    }else{
      candidateSet = new Set([...candidateSet].filter(x => ids.has(x)));
    }

    if(candidateSet.size === 0) break;
  }

  const candidates = candidateSet ? [...candidateSet] : [];
  return candidates
    .map(id => searchDocs[id])
    .filter(doc => {
      const source = normalizeText(`${doc.title}\n${doc.text}`);
      return source.includes(q);
    });
}

/* =========================
   Save / Load
========================= */

async function save(){
  await idbSet(ROOT_KEY, data);
  rebuildSearchIndex();
  setStatus("保存済み");
}

function current(){
  return stack[stack.length - 1];
}

function setStatus(text){
  const el = document.getElementById("status");
  if(el) el.textContent = text;
}

async function initApp(){
  try{
    db = await openDB();

    const saved = await idbGet(ROOT_KEY);
    data = saved || makeEmptyRoot();
    stack = [data];
    rebuildSearchIndex();

    setStatus("IndexedDB使用中");
    render();
  }catch(e){
    console.error(e);
    setStatus("起動エラー");
  }
}

/* =========================
   UI helpers
========================= */

function parseTags(text){
  return text.replace(/#([^\s#<]+)/g, (m, tag) => {
    const safeTag = tag.replace(/'/g, "\\'");
    return `<span class="tag" onclick="searchTag('${safeTag}')">#${tag}</span>`;
  });
}

function renderMarkdown(text){
  let html = marked.parse(text || "");
  return parseTags(html);
}

function collectTags(){
  let tags = {};

  function scan(node){
    node.logs.forEach(l => {
      let matches = (l.text || "").match(/#([^\s#]+)/g);
      if(matches){
        matches.forEach(t => {
          let tag = t.slice(1);
          tags[tag] = (tags[tag] || 0) + 1;
        });
      }
    });

    node.folders.forEach(scan);
  }

  scan(data);
  return tags;
}

function renderTags(){
  let tags = collectTags();
  let div = document.getElementById("tagList");
  div.innerHTML = "";

  Object.keys(tags).sort().forEach(tag => {
    let span = document.createElement("span");
    span.className = "tag";
    span.innerText = `#${tag} (${tags[tag]})`;
    span.onclick = () => searchTag(tag);
    div.appendChild(span);
  });
}

function renderPath(){
  let path = document.getElementById("path");
  path.innerHTML = "";

  stack.forEach((p, i) => {
    let btn = document.createElement("button");
    btn.innerText = p.name;
    btn.onclick = () => {
      stack = stack.slice(0, i + 1);
      render();
    };
    path.appendChild(btn);
  });
}

function searchTag(tag){
  let list = document.getElementById("list");
  list.innerHTML = "";

  function search(node){
    node.logs.forEach((l) => {
      if((l.text || "").includes("#" + tag)){
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
<b>${l.date}</b><br>
${l.title}<br>
${renderMarkdown(l.text)}
`;
        list.appendChild(div);
      }
    });

    node.folders.forEach(search);
  }

  search(data);
}

function render(){
  let node = current();
  let list = document.getElementById("list");
  list.innerHTML = "";

  node.folders.forEach((f, i) => {
    let div = document.createElement("div");
    div.className = "folder";

    div.innerHTML = `📁 ${f.name}
<br>
<button onclick="deleteFolder(${i});event.stopPropagation()">削除</button>`;

    div.onclick = () => {
      stack.push(f);
      render();
    };

    list.appendChild(div);
  });

  node.logs.forEach((l, i) => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
<b>${l.date}</b><br>
${l.title}<br>
${renderMarkdown(l.text)}
<br>
<button onclick="editLog(${i})">編集</button>
<button onclick="deleteLog(${i})">削除</button>
`;

    list.appendChild(div);
  });

  renderTags();
  renderPath();
}

/* =========================
   CRUD
========================= */

async function addFolder(){
  let name = prompt("フォルダ名");
  if(!name) return;

  current().folders.push({
    name: name,
    folders: [],
    logs: []
  });

  await save();
  render();
}

async function deleteFolder(i){
  if(!confirm("フォルダ削除しますか？")) return;

  current().folders.splice(i, 1);
  await save();
  render();
}

function openEditor(){
  editingIndex = null;
  document.getElementById("logTitle").value = "";
  document.getElementById("logText").value = "";
  document.getElementById("editorView").style.display = "block";
}

function editLog(i){
  let log = current().logs[i];
  editingIndex = i;
  document.getElementById("logTitle").value = log.title;
  document.getElementById("logText").value = log.text;
  document.getElementById("editorView").style.display = "block";
}

function closeEditor(){
  document.getElementById("editorView").style.display = "none";
}

async function saveLog(){
  let title = document.getElementById("logTitle").value;
  let text = document.getElementById("logText").value;

  if(!title) return;

  if(editingIndex === null){
    current().logs.push({
      date: new Date().toLocaleDateString(),
      title,
      text
    });
  }else{
    current().logs[editingIndex].title = title;
    current().logs[editingIndex].text = text;
  }

  await save();
  closeEditor();
  render();
}

async function deleteLog(i){
  if(!confirm("ログ削除しますか？")) return;

  current().logs.splice(i, 1);
  await save();
  render();
}

/* =========================
   Search
========================= */

function searchLogs(){
  let q = document.getElementById("searchBox").value;
  let list = document.getElementById("list");
  list.innerHTML = "";

  if(!q.trim()){
    render();
    return;
  }

  const results = searchIndexed(q);

  results.forEach((doc) => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
<b>${doc.date}</b><br>
${doc.title}<br>
${renderMarkdown(doc.text)}
`;
    list.appendChild(div);
  });
}

/* =========================
   Import / Export
========================= */

function exportData(){
  let dataStr = JSON.stringify(data, null, 2);
  let blob = new Blob([dataStr], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "metalog_backup.json";
  a.click();
}

function importData(){
  document.getElementById("importFile").click();
}

document.getElementById("importFile").addEventListener("change", function(e){
  let file = e.target.files[0];
  if(!file) return;

  let reader = new FileReader();

  reader.onload = async function(){
    try{
      data = JSON.parse(reader.result);
      stack = [data];
      await save();
      render();
      alert("インポート完了");
    }catch(err){
      alert("読み込みエラー");
    }
  };

  reader.readAsText(file);
});

/* =========================
   PWA / SW
========================= */

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

initApp();
</script>

</body>
</html>
