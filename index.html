<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MeTaLog</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
font-family:sans-serif;
margin:20px;
background:#111;
color:white;
}

button{
padding:10px;
margin:4px;
font-size:15px;
}

.folder{
border:1px solid #666;
padding:12px;
margin:6px 0;
cursor:pointer;
}

.card{
border:1px solid #444;
padding:12px;
margin:6px 0;
}

input,textarea{
width:100%;
margin:6px 0;
padding:10px;
font-size:16px;
background:#222;
color:white;
border:1px solid #555;
}

.tag{
color:#6cf;
cursor:pointer;
margin-right:8px;
}

</style>
</head>

<body>

<h1>MeTaLog</h1>

<input id="searchBox" placeholder="検索..." oninput="searchLogs()">

<h3>タグ</h3>
<div id="tagList"></div>

<div id="path"></div>

<div id="list"></div>

<button onclick="addFolder()">📁 フォルダ追加</button>
<button onclick="openEditor()">📝 ログ追加</button>

<button onclick="exportData()">📤 エクスポート</button>
<button onclick="importData()">📥 インポート</button>
<input type="file" id="importFile" style="display:none">

<div id="editorView" style="display:none">

<button onclick="closeEditor()">← 戻る</button>

<h2>ログ入力</h2>

<input id="logTitle" placeholder="タイトル">

<textarea id="logText" rows="12" placeholder="本文 (Markdown可)"></textarea>

<button onclick="saveLog()">保存</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("metalog") || '{"name":"root","folders":[],"logs":[]}')

let stack=[data]

let editingIndex=null

function save(){
localStorage.setItem("metalog",JSON.stringify(data))
}

function current(){
return stack[stack.length-1]
}

function parseTags(text){

return text.replace(/#([^\s#]+)/g,(m,tag)=>{

return `<span class="tag" onclick="searchTag('${tag}')">#${tag}</span>`

})

}

function renderMarkdown(text){

let html = marked.parse(text)

return parseTags(html)

}

function collectTags(){

let tags={}

function scan(node){

node.logs.forEach(l=>{

let matches=l.text.match(/#([^\s#]+)/g)

if(matches){

matches.forEach(t=>{

let tag=t.slice(1)

tags[tag]=(tags[tag]||0)+1

})

}

})

node.folders.forEach(scan)

}

scan(data)

return tags

}

function renderTags(){

let tags=collectTags()

let div=document.getElementById("tagList")

div.innerHTML=""

Object.keys(tags).sort().forEach(tag=>{

let span=document.createElement("span")

span.className="tag"

span.innerText=`#${tag} (${tags[tag]})`

span.onclick=()=>searchTag(tag)

div.appendChild(span)

})

}

function searchTag(tag){

let list=document.getElementById("list")

list.innerHTML=""

function search(node){

node.logs.forEach((l)=>{

if(l.text.includes("#"+tag)){

let div=document.createElement("div")

div.className="card"

div.innerHTML=`
<b>${l.date}</b><br>
${l.title}<br>
${renderMarkdown(l.text)}
`

list.appendChild(div)

}

})

node.folders.forEach(search)

}

search(data)

}

function render(){

let node=current()

let list=document.getElementById("list")

list.innerHTML=""

node.folders.forEach((f,i)=>{

let div=document.createElement("div")

div.className="folder"

div.innerHTML=`📁 ${f.name}
<br>
<button onclick="deleteFolder(${i});event.stopPropagation()">削除</button>`

div.onclick=()=>{
stack.push(f)
render()
}

list.appendChild(div)

})

node.logs.forEach((l,i)=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML=`
<b>${l.date}</b><br>
${l.title}<br>
${renderMarkdown(l.text)}
<br>
<button onclick="editLog(${i})">編集</button>
<button onclick="deleteLog(${i})">削除</button>
`

list.appendChild(div)

})

renderTags()

}

function addFolder(){

let name=prompt("フォルダ名")

if(!name)return

current().folders.push({
name:name,
folders:[],
logs:[]
})

save()
render()

}

function deleteFolder(i){

if(!confirm("フォルダ削除しますか？")) return

current().folders.splice(i,1)

save()
render()

}

function openEditor(){

editingIndex=null

document.getElementById("logTitle").value=""
document.getElementById("logText").value=""

document.getElementById("editorView").style.display="block"

}

function editLog(i){

let log=current().logs[i]

editingIndex=i

document.getElementById("logTitle").value=log.title
document.getElementById("logText").value=log.text

document.getElementById("editorView").style.display="block"

}

function closeEditor(){

document.getElementById("editorView").style.display="none"

}

function saveLog(){

let title=document.getElementById("logTitle").value
let text=document.getElementById("logText").value

if(!title)return

if(editingIndex===null){

current().logs.push({
date:new Date().toLocaleDateString(),
title,
text
})

}else{

current().logs[editingIndex].title=title
current().logs[editingIndex].text=text

}

save()

closeEditor()

render()

}

function deleteLog(i){

if(!confirm("ログ削除しますか？")) return

current().logs.splice(i,1)

save()
render()

}

function searchLogs(){

let q=document.getElementById("searchBox").value.toLowerCase()

let list=document.getElementById("list")

list.innerHTML=""

function search(node){

node.logs.forEach((l)=>{

if(
l.title.toLowerCase().includes(q) ||
l.text.toLowerCase().includes(q)
){

let div=document.createElement("div")

div.className="card"

div.innerHTML=`
<b>${l.date}</b><br>
${l.title}<br>
${renderMarkdown(l.text)}
`

list.appendChild(div)

}

})

node.folders.forEach(search)

}

search(data)

}

/* ===== ここからバックアップ機能 ===== */

function exportData(){

let dataStr = JSON.stringify(data,null,2)

let blob = new Blob([dataStr],{type:"application/json"})

let a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "metalog_backup.json"

a.click()

}

function importData(){

document.getElementById("importFile").click()

}

document.getElementById("importFile").addEventListener("change",function(e){

let file = e.target.files[0]

if(!file)return

let reader = new FileReader()

reader.onload=function(){

try{

data = JSON.parse(reader.result)

save()

stack=[data]

render()

alert("インポート完了")

}catch(err){

alert("読み込みエラー")

}

}

reader.readAsText(file)

})

render()

</script>
</body>
</html>
