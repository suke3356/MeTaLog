<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>MeTaLog</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<style>

body{
font-family:sans-serif;
margin:20px;
background:#111;
color:white;
}

button{
padding:12px;
margin:5px;
font-size:16px;
}

.folder{
border:1px solid #666;
padding:12px;
margin:6px 0;
cursor:pointer;
}

.card{
border:1px solid #444;
padding:12px;
margin:6px 0;
}

input,textarea{
width:100%;
margin:6px 0;
padding:10px;
font-size:16px;
background:#222;
color:white;
border:1px solid #555;
}

.screen{
position:absolute;
top:0;
left:0;
width:100%;
min-height:100vh;
background:#111;
padding:20px;
box-sizing:border-box;
}

.hidden{
left:200%;
}

</style>
</head>

<body>

<!-- 一覧画面 -->
<div id="listView" class="screen">

<h1>MeTaLog</h1>

<div id="path"></div>

<div id="list"></div>

<button onclick="addFolder()">📁 フォルダ追加</button>
<button onclick="openEditor()">📝 ログ追加</button>
<button onclick="exportData()">📤 エクスポート</button>
<button onclick="importData()">📥 インポート</button>
<input type="file" id="importFile" style="display:none">

</div>

<!-- 入力画面 -->
<div id="editorView" class="screen hidden">

<button onclick="closeEditor()">← 戻る</button>

<h2>ログ入力</h2>

<input id="logTitle" placeholder="タイトル">

<textarea id="logText" rows="12" placeholder="本文"></textarea>

<button onclick="saveLog()">保存</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("metalog") || '{"name":"root","folders":[],"logs":[]}')

let stack=[data]

function save(){
localStorage.setItem("metalog",JSON.stringify(data))
}

function current(){
return stack[stack.length-1]
}

function showList(){
document.getElementById("listView").classList.remove("hidden")
document.getElementById("editorView").classList.add("hidden")
}

function showEditor(){
document.getElementById("listView").classList.add("hidden")
document.getElementById("editorView").classList.remove("hidden")
}

function render(){

let node=current()

let list=document.getElementById("list")
list.innerHTML=""

node.folders.forEach((f,i)=>{

let div=document.createElement("div")
div.className="folder"

div.innerHTML="📁 "+f.name

div.onclick=()=>{
stack.push(f)
render()
}

list.appendChild(div)

})

node.logs.forEach((l,i)=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`
<b>${l.date}</b><br>
${l.title}<br>
${l.text.replace(/\n/g,"<br>")}
<br>
<button onclick="deleteLog(${i})">削除</button>
`

list.appendChild(div)

})

renderPath()

}

function renderPath(){

let path=document.getElementById("path")

path.innerHTML=""

stack.forEach((p,i)=>{

let btn=document.createElement("button")

btn.innerText=p.name

btn.onclick=()=>{
stack=stack.slice(0,i+1)
render()
}

path.appendChild(btn)

})

}

function addFolder(){

let name=prompt("フォルダ名")

if(!name)return

current().folders.push({
name:name,
folders:[],
logs:[]
})

save()
render()

}

function openEditor(){

document.getElementById("logTitle").value=""
document.getElementById("logText").value=""

showEditor()

setTimeout(()=>{
document.getElementById("logTitle").focus()
},200)

}

function closeEditor(){

showList()

}

function saveLog(){

let title=document.getElementById("logTitle").value
let text=document.getElementById("logText").value

if(!title)return

current().logs.push({
date:new Date().toLocaleDateString(),
title,
text
})

save()

showList()

render()

}

function deleteLog(i){

current().logs.splice(i,1)

save()
render()

}

function exportData(){

let dataStr = JSON.stringify(data,null,2)

let blob = new Blob([dataStr],{type:"application/json"})

let a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "metalog_backup.json"

a.click()

}

function importData(){

document.getElementById("importFile").click()

}

document.getElementById("importFile").addEventListener("change",function(e){

let file = e.target.files[0]

let reader = new FileReader()

reader.onload=function(){

data = JSON.parse(reader.result)

save()

stack=[data]

render()

}

reader.readAsText(file)

})

function autoBackup(){

let lastBackup = localStorage.getItem("metalog_backup_date")

let today = new Date().toISOString().slice(0,10)

if(lastBackup !== today){

let dataStr = JSON.stringify(data,null,2)

let blob = new Blob([dataStr],{type:"application/json"})

let a = document.createElement("a")

a.href = URL.createObjectURL(blob)

a.download = "metalog_backup_"+today+".json"

a.click()

localStorage.setItem("metalog_backup_date",today)

}

}

autoBackup()

render()

</script>

</body>
</html>
