<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MeTaLog - ログ入力</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#111111">

<style>
body{
  font-family:sans-serif;
  margin:20px;
  background:#111;
  color:white;
}
button{
  padding:10px;
  margin:4px;
  font-size:15px;
}
input,textarea{
  width:100%;
  margin:6px 0;
  padding:10px;
  font-size:16px;
  background:#222;
  color:white;
  border:1px solid #555;
  box-sizing:border-box;
}
.panel{
  margin:16px 0;
  padding:12px;
  border:1px solid #555;
  background:#181818;
}
.meta{
  margin:8px 0 0 0;
  font-size:13px;
  color:#aaa;
}
</style>
</head>
<body>

<h1>ログ入力</h1>

<div class="panel">
  <button onclick="goBack()">← 戻る</button>
  <input id="logTitle" placeholder="タイトル">
  <textarea id="logText" rows="12" placeholder="本文 (Markdown可)"></textarea>
  <div id="logMeta" class="meta"></div>
  <button onclick="saveLog()">保存</button>
</div>

<script>
const DB_NAME = "MeTaLogDB";
const DB_VERSION = 1;
const STORE_NAME = "appState";
const ROOT_KEY = "rootData";
const UI_STATE_KEY = "metalog_ui_state";

let db = null;
let data = null;
let uiState = null;

function openDB(){
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);

    request.onupgradeneeded = function(event){
      const database = event.target.result;
      if(!database.objectStoreNames.contains(STORE_NAME)){
        database.createObjectStore(STORE_NAME);
      }
    };

    request.onsuccess = function(){ resolve(request.result); };
    request.onerror = function(){ reject(request.error); };
  });
}

function idbGet(key){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const store = tx.objectStore(STORE_NAME);
    const req = store.get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function idbSet(key, value){
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);
    const req = store.put(value, key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function getCurrentFolder(root, pathIndexes){
  let node = root;
  for(const idx of (pathIndexes || [])){
    if(!node.folders[idx]) break;
    node = node.folders[idx];
  }
  return node;
}

function getDateTimeString(){
  const now = new Date();

  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  const h = String(now.getHours()).padStart(2, "0");
  const min = String(now.getMinutes()).padStart(2, "0");

  return `${y}-${m}-${d} ${h}:${min}`;
}

function updateMetaInfo(log){
  const meta = document.getElementById("logMeta");
  if(!meta) return;

  if(!log){
    meta.textContent = "新規ログ作成";
    return;
  }

  const created = log.createdAt || log.date || "";
  const updated = log.updatedAt || log.date || "";

  meta.textContent = `作成: ${created} / 更新: ${updated}`;
}

async function init(){
  db = await openDB();
  data = await idbGet(ROOT_KEY) || { name:"root", folders:[], logs:[] };
  uiState = JSON.parse(localStorage.getItem(UI_STATE_KEY) || "{}");

  if(uiState.action === "edit-log"){
    const folder = getCurrentFolder(data, uiState.pathIndexes || []);
    const log = folder.logs[uiState.logIndex];
    if(log){
      document.getElementById("logTitle").value = log.title || "";
      document.getElementById("logText").value = log.text || "";
      updateMetaInfo(log);
      return;
    }
  }

  updateMetaInfo(null);
}

async function saveLog(){
  const title = document.getElementById("logTitle").value.trim();
  const text = document.getElementById("logText").value;
  const nowString = getDateTimeString();

  if(!title) return alert("タイトルを入力してください");

  const folder = getCurrentFolder(data, uiState.pathIndexes || []);

  if(uiState.action === "edit-log"){
    const log = folder.logs[uiState.logIndex];
    if(log){
      log.title = title;
      log.text = text;

      if(!log.createdAt){
        log.createdAt = log.date || nowString;
      }

      log.updatedAt = nowString;
      log.date = nowString;
    }
  }else{
    folder.logs.push({
      date: nowString,
      createdAt: nowString,
      updatedAt: nowString,
      title,
      text
    });
  }

  await idbSet(ROOT_KEY, data);
  location.href = "index.html";
}

function goBack(){
  location.href = "index.html";
}

init();
</script>

</body>
</html>
